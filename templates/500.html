<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | Fix Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a0000, #2c0000, #3d0000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .error-card {
            max-width: 500px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-number {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #ff6b6b, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .error-sub {
            font-size: 15px;
            opacity: 0.65;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .icon-wrap {
            font-size: 56px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="error-card">
        <div class="icon-wrap">⚙️</div>
        <div class="error-number">500</div>
        <div class="error-title">Something Went Wrong</div>
        <p class="error-sub">
            Our servers hit a snag. Don't worry — it's not you, it's us.<br>
            Please try again in a moment.
        </p>
        <a href="/services" class="home-btn">
            <i class="fa-solid fa-rotate-right"></i> &nbsp; Try Again
        </a>
    </div>
</body>

</html>
