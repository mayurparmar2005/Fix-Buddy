<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Fix Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: #eee;
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }

        .flash-error {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            border-left: 4px solid #e53935;
        }
    </style>
</head>

<body class="login-page-bg">

    <div class="login-wrapper">
        <div class="login-box">
            <div class="u-reset-icon-wrap"><i class="fa-solid fa-lock-open"></i></div>
            <h1 class="brand-name u-fs-22-brand">Set New Password</h1>
            <p class="subtitle u-mb-4px">For account: <strong>{{ email }}</strong></p>
            <p class="subtitle u-reset-link-expires">🔗 Link expires in 1 hour</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-error">
                <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/reset-password/{{ token }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="auth-input-group">
                    <input type="password" name="password" id="new-pass" placeholder="New Password (min 6 chars)"
                        required minlength="6" oninput="checkStrength(this.value)" autocomplete="new-password">
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strength-fill"></div>
                </div>
                <p id="strength-label" class="u-strength-label"></p>

                <div class="auth-input-group">
                    <input type="password" name="confirm_password" id="confirm-pass" placeholder="Confirm New Password"
                        required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="auth-primary-btn u-w100-mt8">
                    <i class="fa-solid fa-check-circle"></i> &nbsp;Reset Password
                </button>
            </form>
        </div>
    </div>

    <script>
        function checkStrength(val) {
            const fill = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { w: '20%', c: '#e53935', t: 'Very Weak' },
                { w: '40%', c: '#ff7043', t: 'Weak' },
                { w: '60%', c: '#ffa726', t: 'Fair' },
                { w: '80%', c: '#66bb6a', t: 'Strong' },
                { w: '100%', c: '#4CAF50', t: 'Very Strong' },
            ];
            const l = levels[Math.max(0, score - 1)] || levels[0];
            fill.style.width = l.w;
            fill.style.background = l.c;
            label.style.color = l.c;
            label.textContent = l.t;
        }
    </script>

</body>

</html>
