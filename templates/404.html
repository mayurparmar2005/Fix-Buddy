<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Fix Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .error-card {
            max-width: 500px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-number {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .error-sub {
            font-size: 15px;
            opacity: 0.65;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-block;
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(76, 175, 80, 0.5);
        }

        .icon-wrap {
            font-size: 56px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="error-card">
        <div class="icon-wrap">🔍</div>
        <div class="error-number">404</div>
        <div class="error-title">Page Not Found</div>
        <p class="error-sub">
            Oops! The page you're looking for doesn't exist or has been moved.<br>
            Let's get you back on track.
        </p>
        <a href="/services" class="home-btn">
            <i class="fa-solid fa-house"></i> &nbsp; Back to Home
        </a>
    </div>
</body>

</html>
